<!DOCTYPE html>
<html>
<head>
<title>Form - project one</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:url('—Pngtree—modern double color futuristic neon_1181573.jpg') center/cover no-repeat fixed;color:#fff;height:100vh;position:relative;overflow:hidden}
.container{padding:60px 8%;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;position:relative;z-index:10;min-height:100vh;margin-top:-80px}
.left{max-width:500px;width:100%;text-align:center}
h1{font-size:2.5em;margin-bottom:20px}
p{color:#ddd;line-height:1.6}
.form-section{margin-top:30px;text-align:center}
.form-section label{display:block;margin-top:15px;font-weight:bold}
.form-section input{padding:10px;margin-top:5px;margin-left:auto;margin-right:auto;border:none;border-radius:4px;width:100%;max-width:300px;box-sizing:border-box;display:block}
.form-section button{margin-top:20px;padding:12px 20px;background:#e08e2d;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:bold}
.social{margin-top:40px;width:100%;text-align:center}
.social a{color:#fff;margin:0 8px;text-decoration:none;font-size:1.2em}
.back-link{color:#e08e2d;text-decoration:none;margin-top:30px;display:inline-block;font-weight:bold}
.logo{position:absolute;top:20px;left:30px;width:60px;height:60px;z-index:15}
.logo img{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>

<div class="logo">
  <img src="ce5db4a8-0e28-474a-baae-db5a16024635.png" alt="Logo">
</div>

<div class="container">
  <div class="left">
    <h1>Contact Form</h1>
    <p>Please fill out the form below to get in touch with us.</p>
    <form class="form-section">
      <label for="fname">First name:</label>
      <input type="text" id="fname" name="fname" placeholder="Enter your first name">
      <label for="lname">Last name:</label>
      <input type="text" id="lname" name="lname" placeholder="Enter your last name">
      <button type="button" onclick="window.location.href='nextpage.html'">Submit</button>
   
    </form>
    <a href="index.html" class="back-link">← Back to Home</a>
    <div class="social">
      <a href="#">FB</a><a href="#">TW</a><a href="#">IG</a><a href="#">YT</a>
    </div>
  </div>
</div>

</body>
</html>
